<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>どこかへ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=LINE+Seed+JP&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}

    :root {
      --bg:       #1c1c1e;
      --bg2:      #2c2c2e;
      --btn-bg:   rgba(58,58,67,0.88);
      --text:     #ffffff;
      --muted:    rgba(255,255,255,0.50);
      --green:    #2ecc52;
      --arrival:  #1db950;
      --danger:   #ff3b30;
      --font:     'LINE Seed JP', 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      --mono:     'Inter', system-ui, sans-serif;
      --safe-t:   env(safe-area-inset-top, 0px);
      --safe-b:   env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    /* ─── SCREENS ─── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      will-change: opacity, transform;
      transition: opacity .38s ease, transform .38s ease;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(.97);
    }

    /* ─── LOADING ─── */
    #s-loading { background: var(--bg); }

    .spin-ring {
      width: 52px; height: 52px;
      border: 2.5px solid rgba(255,255,255,.12);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to{ transform:rotate(360deg); } }

    .loading-txt {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: .06em;
    }

    /* ─── NAV ─── */
    #s-nav { background: var(--bg); }

    .arrow-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 52px;
      width: 160px;
      height: 200px;
    }

    #nav-arrow {
      font-size: 160px;
      color: white;
      transition: transform .25s cubic-bezier(.25,.46,.45,.94);
      filter: drop-shadow(0 0 24px rgba(255,255,255,.08));
      font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;
      line-height: 1;
    }

    .dist-wrap { text-align: center; }

    .dist-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      line-height: 1;
    }

    .dist-num {
      font-family: 'Inter', monospace;
      font-size: 76px;
      font-weight: 300;
      letter-spacing: -3px;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .dist-unit {
      font-family: 'Inter', monospace;
      font-size: 28px;
      font-weight: 300;
      color: rgba(255,255,255,.85);
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .dist-label {
      margin-top: 10px;
      font-size: 17px;
      color: var(--muted);
      letter-spacing: .12em;
    }

    .compass-hint {
      position: absolute;
      bottom: calc(140px + var(--safe-b));
      font-size: 12px;
      color: rgba(255,255,255,.28);
      letter-spacing: .08em;
    }

    /* ─── ARRIVAL ─── */
    #s-arrival {
      background: var(--arrival);
      animation: none;
    }
    #s-arrival.hidden { transform: scale(.97); }

    .arrival-pin {
      font-size: 68px;
      color: white;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
      margin-bottom: 22px;
      animation: pinBounce .55s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pinBounce {
      from{ transform:scale(.4) translateY(30px); opacity:0; }
      to  { transform:scale(1) translateY(0);     opacity:1; }
    }

    .arrival-lbl {
      font-size: 17px;
      color: rgba(255,255,255,.82);
      letter-spacing: .12em;
      margin-bottom: 10px;
    }

    .arrival-name {
      font-size: 34px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      padding: 0 36px;
      line-height: 1.3;
      margin-bottom: 28px;
    }

    .arrival-dist-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 21px;
      color: rgba(255,255,255,.88);
    }

    .next-btn {
      position: absolute;
      bottom: calc(36px + var(--safe-b));
      left: 24px; right: 24px;
      background: rgba(255,255,255,.22);
      border: none;
      border-radius: 50px;
      padding: 17px;
      color: white;
      font-family: var(--font);
      font-size: 16px;
      letter-spacing: .06em;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background .15s, transform .12s;
    }
    .next-btn:active { background: rgba(255,255,255,.32); transform: scale(.97); }

    /* ─── ERROR ─── */
    #s-error { background: var(--bg); text-align: center; padding: 48px; }
    .err-icon { font-size: 52px !important; font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48; opacity: .45; margin-bottom: 20px; display: block; }
    .err-title { font-size: 19px; font-weight: 700; margin-bottom: 10px; }
    .err-msg { font-size: 14px; color: var(--muted); line-height: 1.75; }
    .retry-btn {
      margin-top: 32px;
      background: rgba(255,255,255,.12);
      border: none;
      border-radius: 50px;
      padding: 13px 44px;
      color: white;
      font-family: var(--font);
      font-size: 15px;
      cursor: pointer;
    }

    /* ─── BOTTOM CONTROLS ─── */
    #controls {
      position: fixed;
      left: 0; right: 0;
      bottom: calc(36px + var(--safe-b));
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
      z-index: 10;
    }

    .ctrl-col { display: flex; flex-direction: column; gap: 12px; pointer-events: all; }

    .cbtn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--btn-bg);
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: transform .13s, background .13s, opacity .2s;
      pointer-events: all;
    }
    .cbtn:active { transform: scale(.9); background: rgba(80,80,90,.95); }
    .cbtn.off { opacity: .3; pointer-events: none; }
    .material-symbols-rounded {
      font-family: 'Material Symbols Rounded';
      font-weight: normal;
      font-style: normal;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .cbtn .material-symbols-rounded { font-size: 21px; color: white; }

    /* ─── MENU OVERLAY ─── */
    #menu-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.52);
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    #menu-overlay.open { opacity:1; pointer-events:all; }

    #menu-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: min(88%, 380px);
      background: #1c1c1e;
      z-index: 101;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .34s cubic-bezier(.4,0,.2,1);
      box-shadow: -12px 0 40px rgba(0,0,0,.5);
    }
    #menu-panel.open { transform: translateX(0); }

    .menu-head {
      padding: calc(20px + var(--safe-t)) 20px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .menu-title-txt { font-size: 19px; font-weight: 700; letter-spacing: .03em; }

    .menu-close-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,.1);
      border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white;
    }

    .menu-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .mtab {
      flex: 1; padding: 13px 8px;
      background: none; border: none;
      color: var(--muted); font-family: var(--font); font-size: 14px;
      cursor: pointer; letter-spacing: .04em;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .mtab.active { color: #fff; border-bottom-color: #fff; }

    .menu-body { flex: 1; overflow-y: auto; padding: 14px; }

    .hist-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 12px; border-radius: 13px;
      background: var(--bg2); margin-bottom: 8px;
    }
    .hist-icon { font-size: 19px; color: var(--green); font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20; }
    .hist-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .hist-meta { font-size: 12px; color: var(--muted); }

    .empty-box { text-align: center; padding: 64px 20px; color: var(--muted); font-size: 14px; line-height: 2; }
    .empty-emoji { font-size: 44px; display: block; margin-bottom: 12px; opacity: .4; }

    /* Settings */
    .sett-row { padding: 18px 4px; border-bottom: 1px solid rgba(255,255,255,.06); }
    .sett-lbl { font-size: 13px; color: var(--muted); margin-bottom: 6px; letter-spacing: .04em; }
    .sett-val { font-size: 16px; font-weight: 600; }
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 3px;
      background: rgba(255,255,255,.18); border-radius: 2px; margin-top: 14px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px;
      background: white; border-radius: 50%; cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,.4);
    }
    .danger-btn {
      width: 100%; margin-top: 12px;
      background: rgba(255,59,48,.14); border: none;
      color: var(--danger); padding: 12px;
      border-radius: 11px; font-family: var(--font); font-size: 14px; cursor: pointer;
      transition: background .15s;
    }
    .danger-btn:active { background: rgba(255,59,48,.25); }

    /* ─── DIALOGS ─── */
    .dlg-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .dlg-overlay.open { opacity:1; pointer-events:all; }

    .dlg {
      background: #2c2c2e; border-radius: 20px;
      padding: 28px 24px 20px;
      width: calc(100% - 48px); max-width: 320px;
      transform: scale(.88);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1);
    }
    .dlg-overlay.open .dlg { transform: scale(1); }

    .dlg-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 10px; }
    .dlg-msg { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.7; margin-bottom: 24px; }
    .dlg-row { display: flex; gap: 10px; }
    .dlg-btn {
      flex: 1; padding: 13px; border-radius: 12px; border: none;
      font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .dlg-btn:active { opacity: .75; }
    .dlg-cancel  { background: rgba(255,255,255,.1); color: white; }
    .dlg-confirm { background: white; color: #1c1c1e; }
    .dlg-danger  { background: var(--danger); color: white; }
  </style>
</head>
<body>

<!-- ── Loading ── -->
<div id="s-loading" class="screen hidden">
  <div class="spin-ring"></div>
  <div class="loading-txt">現在地を取得中…</div>
</div>

<!-- ── Navigation ── -->
<div id="s-nav" class="screen hidden">
  <div class="arrow-wrap">
    <span class="material-symbols-rounded" id="nav-arrow">north</span>
  </div>
  <div class="dist-wrap">
    <div class="dist-row">
      <span class="dist-num" id="dist-num">--</span>
      <span class="dist-unit" id="dist-unit">km</span>
    </div>
    <div class="dist-label" id="dist-lbl">前方</div>
  </div>
  <div class="compass-hint" id="compass-hint"></div>
</div>

<!-- ── Arrival ── -->
<div id="s-arrival" class="screen hidden">
  <span class="material-symbols-rounded arrival-pin">location_on</span>
  <div class="arrival-lbl">到着</div>
  <div class="arrival-name" id="arr-name">--</div>
  <div class="arrival-dist-row">
    <span>↑</span>
    <span id="arr-dist">--</span>
  </div>
  <button class="next-btn" onclick="goNext()">次の場所へ</button>
</div>

<!-- ── Error ── -->
<div id="s-error" class="screen hidden">
  <span class="material-symbols-rounded err-icon">wifi_off</span>
  <div class="err-title">位置情報を取得できません</div>
  <div class="err-msg">設定アプリからこのブラウザの<br>位置情報アクセスを許可してください。</div>
  <button class="retry-btn" onclick="startApp()">再試行</button>
</div>

<!-- ── Controls ── -->
<div id="controls">
  <div class="ctrl-col">
    <button class="cbtn off" id="btn-undo" onclick="confirmUndo()">
      <span class="material-symbols-rounded">undo</span>
    </button>
    <button class="cbtn" id="btn-skip" onclick="confirmSkip()">
      <span class="material-symbols-rounded">close</span>
    </button>
  </div>
  <button class="cbtn" onclick="openMenu()">
    <span class="material-symbols-rounded">more_horiz</span>
  </button>
</div>

<!-- ── Menu ── -->
<div id="menu-overlay" onclick="closeMenu()"></div>
<div id="menu-panel">
  <div class="menu-head">
    <div class="menu-title-txt">メニュー</div>
    <button class="menu-close-btn" onclick="closeMenu()">
      <span class="material-symbols-rounded" style="font-size:17px">close</span>
    </button>
  </div>
  <div class="menu-tabs">
    <button class="mtab active" id="tab-hist" onclick="switchTab('hist')">到着リスト</button>
    <button class="mtab" id="tab-sett" onclick="switchTab('sett')">設定</button>
  </div>
  <div class="menu-body" id="menu-body"></div>
</div>

<!-- ── Skip Dialog ── -->
<div class="dlg-overlay" id="dlg-skip">
  <div class="dlg">
    <div class="dlg-title">この場所をスキップ</div>
    <div class="dlg-msg">この場所はスキップされ、次の場所が新しく選ばれます。</div>
    <div class="dlg-row">
      <button class="dlg-btn dlg-cancel"  onclick="closeDlg('dlg-skip')">やめる</button>
      <button class="dlg-btn dlg-danger"  onclick="doSkip()">スキップ</button>
    </div>
  </div>
</div>

<!-- ── Undo Dialog ── -->
<div class="dlg-overlay" id="dlg-undo">
  <div class="dlg">
    <div class="dlg-title">スキップを取り消す</div>
    <div class="dlg-msg">直前にスキップした場所を<br>もう一度目的地に設定します。</div>
    <div class="dlg-row">
      <button class="dlg-btn dlg-cancel"  onclick="closeDlg('dlg-undo')">やめる</button>
      <button class="dlg-btn dlg-confirm" onclick="doUndo()">取り消す</button>
    </div>
  </div>
</div>

let S = {
  target:      null,
  lat:         null,
  lng:         null,
  heading:     null,
  compassOn:   false,
  pool:        [],        // Overpassから取得したスポット一覧
  poolLat:     null,      // pool取得時の緯度
  poolLng:     null,      // pool取得時の経度
  poolTime:    0,         // pool取得時刻 (ms)
  skipStack:   [],
  visited:     [],
  arrivedFlag: false,
  watchId:     null,
  activeTab:   'hist',
  arrowDeg:    0,        // 矢印の現在角度（累積・最短経路計算用）
};

const POOL_TTL    = 12 * 3600 * 1000; // 12時間キャッシュ
const POOL_RADIUS = 16000;            // 16km（15km上限に+1kmバッファ）
const POOL_MIN    = 10;               // プールが少なくなったら再取得
const DIST_MIN    = 1000;             // 選出最短 1km
const DIST_MAX    = 15000;            // 選出最長 15km
const STORE_KEY   = 'dokoka_v3';      // v3: 旧150kmキャッシュを無効化

// ═══════════════════════════════════════
//  PERSIST
// ═══════════════════════════════════════
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    S.visited   = d.visited   || [];
    S.skipStack = d.skipStack || [];
    S.target    = d.target    || null;
    if(d.pool && d.poolTime && Date.now() - d.poolTime < POOL_TTL){
      S.pool     = d.pool;
      S.poolLat  = d.poolLat;
      S.poolLng  = d.poolLng;
      S.poolTime = d.poolTime;
    }
  } catch(e){}
}
function save() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      visited:   S.visited,
      skipStack: S.skipStack,
      target:    S.target,
      pool:      S.pool,
      poolLat:   S.poolLat,
      poolLng:   S.poolLng,
      poolTime:  S.poolTime,
    }));
  } catch(e){}
}

// ═══════════════════════════════════════
//  GEO MATH
// ═══════════════════════════════════════
function rad(d){ return d * Math.PI / 180; }

function haversine(a,b,c,d){
  const R=6371000, dL=rad(c-a), dG=rad(d-b);
  const x=Math.sin(dL/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function bearingTo(a,b,c,d){
  const y=Math.sin(rad(d-b))*Math.cos(rad(c));
  const x=Math.cos(rad(a))*Math.sin(rad(c))-Math.sin(rad(a))*Math.cos(rad(c))*Math.cos(rad(d-b));
  return(Math.atan2(y,x)*180/Math.PI+360)%360;
}

function relDirText(relAngle){
  const a = ((relAngle % 360) + 360) % 360;
  const n = a > 180 ? a - 360 : a;
  if(n >= -45  && n <  45)  return '前方';
  if(n >=  45  && n < 135)  return '右側';
  if(n >= -135 && n < -45)  return '左側';
  return '後方';
}

function fmtDist(m){
  if(m<1000) return{v:String(Math.round(m)),u:'m'};
  return{v:(m/1000).toFixed(1),u:'km'};
}

//  OVERPASS API
// ═══════════════════════════════════════
function catFromTags(t){
  if(t.tourism==='museum'||t.tourism==='gallery') return '博物館';
  if(t.tourism==='viewpoint')     return '展望台';
  if(t.tourism==='zoo'||t.tourism==='aquarium'||t.tourism==='theme_park') return '施設';
  if(t.tourism==='attraction')    return '観光';
  if(t.historic==='castle')       return '城';
  if(t.historic)                  return '史跡';
  if(t.leisure==='park')          return '公園';
  if(t.leisure==='garden')        return '庭園';
  if(t.leisure==='nature_reserve')return '自然';
  if(t.amenity==='place_of_worship'){
    if(t.religion==='shinto') return '神社';
    if(t.religion==='buddhist') return 'お寺';
    return '寺社';
  }
  if(t.natural==='peak')          return '山';
  if(t.natural==='waterfall')     return '滝';
  if(t.natural==='beach')         return '海岸';
  if(t.natural==='hot_spring')    return '温泉';
  return 'スポット';
}

// 日本語文字を含むか
const JA_RE = /[\u3000-\u9fff\uff00-\uffef]/;

async function fetchFromOverpass(lat, lng) {
  const r = POOL_RADIUS;
  // node を優先 (高速)、way/relation は公園・寺社のみ
  const q = `[out:json][timeout:20];
(
  node["tourism"~"attraction|museum|viewpoint|zoo|theme_park|aquarium|gallery"]["name"](around:${r},${lat},${lng});
  node["historic"~"castle|ruins|monument|memorial|shrine|archaeological_site"]["name"](around:${r},${lat},${lng});
  node["leisure"~"park|garden|nature_reserve"]["name"](around:${r},${lat},${lng});
  node["amenity"="place_of_worship"]["name"](around:${r},${lat},${lng});
  node["natural"~"peak|waterfall|beach|hot_spring|cave_entrance"]["name"](around:${r},${lat},${lng});
  way["leisure"~"park|garden"]["name"](around:${r},${lat},${lng});
  way["amenity"="place_of_worship"]["name"](around:${r},${lat},${lng});
  way["tourism"~"attraction|museum"]["name"](around:${r},${lat},${lng});
  way["historic"~"castle|ruins"]["name"](around:${r},${lat},${lng});
);
out center qt;`;

  const res = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: 'data=' + encodeURIComponent(q),
  });
  if(!res.ok) throw new Error('Overpass error: ' + res.status);
  const json = await res.json();

  const seen = new Set();
  const places = [];
  for(const e of json.elements){
    const name = e.tags?.name;
    if(!name || !JA_RE.test(name)) continue;
    if(seen.has(name)) continue;
    seen.add(name);
    const elat = e.lat ?? e.center?.lat;
    const elng = e.lon ?? e.center?.lon;
    if(!elat || !elng) continue;
    // 距離を再計算して確実に上限内のみ
    const dm = haversine(lat, lng, elat, elng);
    if(dm > DIST_MAX) continue;
    places.push({ name, lat: elat, lng: elng, cat: catFromTags(e.tags||{}) });
  }
  return places;
}

async function ensurePool() {
  // キャッシュが有効か確認
  const cacheOk = S.pool.length >= POOL_MIN
    && S.poolTime > 0
    && Date.now() - S.poolTime < POOL_TTL
    && S.poolLat !== null
    && haversine(S.lat, S.lng, S.poolLat, S.poolLng) < POOL_RADIUS * 0.5;

  if(cacheOk) return true;

  setLoadingText('スポットを検索中…');
  try {
    const places = await fetchFromOverpass(S.lat, S.lng);
    if(places.length > 0){
      S.pool     = places;
      S.poolLat  = S.lat;
      S.poolLng  = S.lng;
      S.poolTime = Date.now();
      save();
      setLoadingText(`${places.length.toLocaleString()}件のスポットを発見`);
      return true;
    }
  } catch(err){
    console.warn('Overpass failed, using fallback:', err);
  }
  // フォールバック
  if(S.pool.length === 0){
    S.pool = [...FALLBACK_PLACES];
    S.poolTime = Date.now();
  }
  return false;
}

function setLoadingText(t){
  const el = document.querySelector('.loading-txt');
  if(el) el.textContent = t;
}

// ═══════════════════════════════════════
//  TARGET SELECTION  (distance-weighted)
// ═══════════════════════════════════════
function usedNames(){
  return new Set([...S.visited.map(v=>v.name), ...S.skipStack.map(s=>s.name)]);
}

function pickFromPool(){
  const used = usedNames();

  // 1〜15km 圏内に絞る
  function inRange(p){
    const m = haversine(S.lat, S.lng, p.lat, p.lng);
    return m >= DIST_MIN && m <= DIST_MAX;
  }

  let pool = S.pool.filter(p => !used.has(p.name) && inRange(p));

  // 範囲内が尽きたら訪問履歴だけリセット
  if(pool.length === 0){
    S.visited = []; save();
    pool = S.pool.filter(p => inRange(p) && !new Set(S.skipStack.map(s=>s.name)).has(p.name));
  }
  // それでもなければレンジ内全部
  if(pool.length === 0){
    pool = S.pool.filter(p => inRange(p));
  }
  // レンジ内が一件もなければフォールバック（プール再取得が必要な状況）
  if(pool.length === 0){
    pool = S.pool.filter(p => !used.has(p.name));
    if(pool.length === 0) pool = [...S.pool];
  }

  // 1〜15km 内は均等ランダム（距離による偏りなし）
  return pool[Math.floor(Math.random() * pool.length)];
}

// ═══════════════════════════════════════
//  COMPASS
// ═══════════════════════════════════════
function initCompass(){
  if(!window.DeviceOrientationEvent) return;

  const handle = e=>{
    if(e.webkitCompassHeading!=null){
      S.heading = e.webkitCompassHeading; S.compassOn=true;
    } else if(e.absolute && e.alpha!=null){
      S.heading = (360-e.alpha+360)%360; S.compassOn=true;
    }
  };

  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    document.addEventListener('touchstart', async ()=>{
      try{
        if(await DeviceOrientationEvent.requestPermission()==='granted'){
          window.addEventListener('deviceorientation',handle,true);
        }
      }catch(e){}
    },{once:true,passive:true});
  } else {
    window.addEventListener('deviceorientationabsolute',handle,true);
    window.addEventListener('deviceorientation',handle,true);
  }
}

// ═══════════════════════════════════════
//  UI
// ═══════════════════════════════════════
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  const el = document.getElementById('s-'+name);
  if(el){ el.classList.remove('hidden'); }
  document.getElementById('controls').style.visibility =
    (name==='nav') ? 'visible' : 'hidden';
}

function refreshNav(){
  if(!S.target || S.lat===null) return;

  const dist = haversine(S.lat,S.lng,S.target.lat,S.target.lng);
  const bear = bearingTo(S.lat,S.lng,S.target.lat,S.target.lng);

  const{v,u} = fmtDist(dist);
  document.getElementById('dist-num').textContent = v;
  document.getElementById('dist-unit').textContent = u;

  let targetDeg, label, hint='';
  if(S.compassOn && S.heading!=null){
    const rel = bear - S.heading;
    targetDeg = rel;
    label = relDirText(rel);
  } else {
    targetDeg = bear;
    label = '前方';
    hint = 'コンパス未使用（北が上）';
  }

  // 最短経路で回転：前回角度との差を -180〜+180 に正規化して累積
  const delta = ((targetDeg - S.arrowDeg) % 360 + 540) % 360 - 180;
  S.arrowDeg += delta;

  document.getElementById('nav-arrow').style.transform = `rotate(${S.arrowDeg}deg)`;
  document.getElementById('dist-lbl').textContent = label;
  document.getElementById('compass-hint').textContent = hint;
}

function checkArrival(){
  if(!S.target || S.lat===null || S.arrivedFlag) return;
  const d = haversine(S.lat,S.lng,S.target.lat,S.target.lng);
  if(d <= 50){
    S.arrivedFlag = true;
    doArrival(d);
  }
}

function doArrival(dist){
  const{v,u} = fmtDist(dist);
  document.getElementById('arr-name').textContent = S.target.name;
  document.getElementById('arr-dist').textContent = v+u;
  S.visited.unshift({
    name: S.target.name,
    dist: Math.round(dist),
    time: new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',
          hour:'2-digit',minute:'2-digit'}),
  });
  S.target = null;
  save();
  showScreen('arrival');
}

async function goNext(){
  S.arrivedFlag = false;
  // プールが少なければ再取得
  const used = usedNames();
  const remaining = S.pool.filter(p=>!used.has(p.name)).length;
  if(remaining < POOL_MIN && S.lat !== null){
    showScreen('loading');
    await ensurePool();
  }
  S.target = pickFromPool();
  save();
  showScreen('nav');
  refreshNav();
}

// ─── skip / undo ───
function confirmSkip(){ openDlg('dlg-skip'); }
function confirmUndo(){
  if(!S.skipStack.length) return;
  openDlg('dlg-undo');
}

async function doSkip(){
  closeDlg('dlg-skip');
  if(S.target) S.skipStack.push(S.target);
  S.arrivedFlag = false;
  const used = usedNames();
  const remaining = S.pool.filter(p=>!used.has(p.name)).length;
  if(remaining < POOL_MIN && S.lat !== null){
    showScreen('loading');
    await ensurePool();
    showScreen('nav');
  }
  S.target = pickFromPool();
  save();
  refreshNav();
  syncUndoBtn();
}

function doUndo(){
  closeDlg('dlg-undo');
  if(!S.skipStack.length) return;
  S.target = S.skipStack.pop();
  S.arrivedFlag = false;
  save();
  refreshNav();
  syncUndoBtn();
}

function syncUndoBtn(){
  document.getElementById('btn-undo').classList.toggle('off', !S.skipStack.length);
}

// ─── menu ───
function openMenu(){
  document.getElementById('menu-overlay').classList.add('open');
  document.getElementById('menu-panel').classList.add('open');
  renderMenu();
}
function closeMenu(){
  document.getElementById('menu-overlay').classList.remove('open');
  document.getElementById('menu-panel').classList.remove('open');
}
function switchTab(t){
  S.activeTab=t;
  document.querySelectorAll('.mtab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  renderMenu();
}
function renderMenu(){
  const body = document.getElementById('menu-body');
  const poolCount = S.pool.length;
  if(S.activeTab==='hist'){
    if(!S.visited.length){
      body.innerHTML = `<div class="empty-box"><span class="empty-emoji">🗺️</span>まだ到着した場所はありません。<br>最初の目的地に向かいましょう！</div>`;
    } else {
      body.innerHTML = S.visited.map(v=>`
        <div class="hist-item">
          <span class="material-symbols-rounded hist-icon">check_circle</span>
          <div>
            <div class="hist-name">${v.name}</div>
            <div class="hist-meta">${v.time}　到着時 ${v.dist}m</div>
          </div>
        </div>`).join('');
    }
  } else {
    body.innerHTML = `
      <div class="sett-row">
        <div class="sett-lbl">読み込み済みスポット数</div>
        <div class="sett-val">${poolCount.toLocaleString()}件（半径15km以内）</div>
      </div>
      <div class="sett-row">
        <div class="sett-lbl">スポットを再取得</div>
        <button class="danger-btn" style="background:rgba(255,255,255,.1);color:white;" onclick="closeMenu();refetchPool()">現在地周辺を再検索する</button>
      </div>
      <div class="sett-row">
        <div class="sett-lbl">到着リストをリセット</div>
        <button class="danger-btn" onclick="resetHist()">リストを削除する</button>
      </div>
      <div class="sett-row">
        <div class="sett-lbl">スキップ履歴を消去</div>
        <button class="danger-btn" onclick="resetSkips()">スキップ履歴を削除する</button>
      </div>`;
  }
}

async function refetchPool(){
  if(S.lat===null) return;
  S.pool=[]; S.poolTime=0;
  showScreen('loading');
  await ensurePool();
  showScreen('nav');
}

function resetHist(){
  if(confirm('到着リストをすべて削除しますか？')){
    S.visited=[]; save(); renderMenu();
  }
}
function resetSkips(){
  if(confirm('スキップ履歴を削除しますか？')){
    S.skipStack=[]; save(); syncUndoBtn(); renderMenu();
  }
}

// ─── dialogs ───
function openDlg(id){ document.getElementById(id).classList.add('open'); }
function closeDlg(id){ document.getElementById(id).classList.remove('open'); }

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
async function startApp(){
  showScreen('loading');
  setLoadingText('現在地を取得中…');

  if(!navigator.geolocation){ showScreen('error'); return; }

  navigator.geolocation.getCurrentPosition(async pos=>{
    S.lat = pos.coords.latitude;
    S.lng = pos.coords.longitude;
    // プール取得
    await ensurePool();
    // 既存ターゲットが無ければ新規選択
    if(!S.target){ S.target = pickFromPool(); save(); }
    showScreen('nav');
    refreshNav();
    startWatch();
  }, ()=>{
    showScreen('error');
  }, {enableHighAccuracy:true, timeout:20000, maximumAge:0});
}

function init(){
  load();
  syncUndoBtn();
  initCompass();
  startApp();
}

function startWatch(){
  if(S.watchId!==null) return;
  S.watchId = navigator.geolocation.watchPosition(pos=>{
    S.lat = pos.coords.latitude;
    S.lng = pos.coords.longitude;
    refreshNav();
    checkArrival();
  }, null, {enableHighAccuracy:true, maximumAge:2000});
}

// Compass refresh loop
function tick(){
  if(!document.getElementById('s-nav').classList.contains('hidden')){
    refreshNav();
  }
  requestAnimationFrame(tick);
}

init();
requestAnimationFrame(tick);
</script>
